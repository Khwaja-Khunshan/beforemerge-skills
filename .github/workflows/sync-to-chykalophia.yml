name: Sync to Chykalophia
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Chykalophia mirror
        run: |
          git remote add mirror https://x-access-token:${{ secrets.CHYKALOPHIA_MIRROR_PAT }}@github.com/Chykalophia/beforemerge-skills.git
          git push mirror main --force
